name: Benchmarks

on:
  pull_request:
    branches: [main]
    paths:
      - "packages/compiler/**"
      - "packages/runtime/**"
      - "packages/schema/**"
      - "benchmarks/**"

jobs:
  bench:
    name: Performance benchmarks
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build packages
        run: pnpm build

      - name: Run benchmarks
        run: pnpm bench 2>&1 | tee /tmp/bench-results.txt

      - name: Post benchmark results as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = fs.readFileSync('/tmp/bench-results.txt', 'utf8');
            const body = `## Benchmark results\n\n\`\`\`\n${results}\n\`\`\`\n\n*Generated on Node.js 20, ubuntu-latest*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });